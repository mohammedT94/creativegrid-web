<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="800" height="500" fill="#eef1f6"/>
  <!-- dim LinkedIn-style backdrop -->
  <g opacity="0.6">
    <rect x="40" y="40" width="300" height="180" rx="12" fill="#fff"/>
    <circle cx="90" cy="90" r="26" fill="#dde3ec"/>
    <rect x="130" y="78" width="150" height="10" rx="5" fill="#dde3ec"/>
    <rect x="130" y="96" width="110" height="8" rx="4" fill="#e7ebf1"/>
    <rect x="56" y="136" width="268" height="8" rx="4" fill="#e7ebf1"/>
    <rect x="56" y="154" width="230" height="8" rx="4" fill="#e7ebf1"/>
    <rect x="40" y="240" width="300" height="220" rx="12" fill="#fff"/>
  </g>
  <!-- publisher panel -->
  <g>
    <rect x="372" y="40" width="396" height="420" rx="16" fill="#ffffff" stroke="#d9dfe9"/>
    <!-- purple header -->
    <path d="M372 56a16 16 0 0 1 16-16h364a16 16 0 0 1 16 16v44H372z" fill="#6366f1"/>
    <text x="392" y="76" font-size="15" font-weight="700" fill="#fff">Publisher Content</text>
    <rect x="528" y="64" width="48" height="18" rx="9" fill="#4ade80"/>
    <text x="552" y="77" font-size="9" font-weight="700" fill="#0c3b1e" text-anchor="middle">Active</text>
    <!-- tabs -->
    <g font-size="11" fill="#c7c9f5">
      <text x="392" y="119" fill="#fff" font-weight="700">Import</text>
      <text x="452" y="119">Dashboard</text>
      <text x="534" y="119">Queue</text>
      <text x="592" y="119">Preview</text>
      <text x="660" y="119">Logs</text>
    </g>
    <line x1="388" y1="128" x2="436" y2="128" stroke="#fff" stroke-width="2"/>
    <!-- drop zone -->
    <rect x="392" y="144" width="356" height="78" rx="10" fill="#f4f5ff" stroke="#a5b4fc" stroke-dasharray="5 4"/>
    <rect x="552" y="160" width="36" height="30" rx="5" fill="#fff" stroke="#6366f1"/>
    <path d="M567 168v14M562 173l5-5 5 5" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="570" y="206" font-size="11" fill="#5b6478" text-anchor="middle">Drop Excel file here or click to upload</text>
    <!-- content categories -->
    <text x="392" y="248" font-size="11" font-weight="700" fill="#1c2333">Content Categories</text>
    <g font-size="10">
      <rect x="392" y="258" width="172" height="34" rx="7" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="392" y="258" width="3" height="34" rx="1.5" fill="#6366f1"/>
      <rect x="404" y="269" width="13" height="13" rx="3" fill="#6366f1"/>
      <text x="424" y="279" fill="#1c2333" font-weight="600">App Idea</text>
      <text x="552" y="279" fill="#8a93a6" text-anchor="end">P1</text>
      <rect x="576" y="258" width="172" height="34" rx="7" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="576" y="258" width="3" height="34" rx="1.5" fill="#6366f1"/>
      <rect x="588" y="269" width="13" height="13" rx="3" fill="#6366f1"/>
      <text x="608" y="279" fill="#1c2333" font-weight="600">Profitable App</text>
      <text x="736" y="279" fill="#8a93a6" text-anchor="end">P2</text>
      <rect x="392" y="300" width="172" height="34" rx="7" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="392" y="300" width="3" height="34" rx="1.5" fill="#f59e0b"/>
      <rect x="404" y="311" width="13" height="13" rx="3" fill="#6366f1"/>
      <text x="424" y="321" fill="#1c2333" font-weight="600">Marketing Hack</text>
      <text x="552" y="321" fill="#8a93a6" text-anchor="end">P3</text>
      <rect x="576" y="300" width="172" height="34" rx="7" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="576" y="300" width="3" height="34" rx="1.5" fill="#6366f1"/>
      <rect x="588" y="311" width="13" height="13" rx="3" fill="#6366f1"/>
      <text x="608" y="321" fill="#1c2333" font-weight="600">Technical</text>
      <text x="736" y="321" fill="#8a93a6" text-anchor="end">P5</text>
    </g>
    <!-- platforms -->
    <text x="392" y="358" font-size="11" font-weight="700" fill="#1c2333">Platforms</text>
    <g>
      <rect x="392" y="368" width="110" height="62" rx="9" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="438" y="382" width="18" height="18" rx="4" fill="#1877f2"/>
      <text x="447" y="418" font-size="10" font-weight="600" fill="#1c2333" text-anchor="middle">Facebook</text>
      <rect x="515" y="368" width="110" height="62" rx="9" fill="#f6f7fb" stroke="#e2e6ee"/>
      <rect x="561" y="382" width="18" height="18" rx="4" fill="#0a66c2"/>
      <text x="570" y="418" font-size="10" font-weight="600" fill="#1c2333" text-anchor="middle">LinkedIn</text>
      <rect x="638" y="368" width="110" height="62" rx="9" fill="#eef0ff" stroke="#6366f1"/>
      <rect x="684" y="382" width="18" height="18" rx="4" fill="#0f1419"/>
      <text x="693" y="418" font-size="10" font-weight="600" fill="#1c2333" text-anchor="middle">Twitter / X</text>
    </g>
